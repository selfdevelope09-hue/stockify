<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Atharva Capital | Professional Crypto Trading Terminal</title>
    
    <!-- Lightweight Charts CDN (Working) -->
    <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', 'SF Mono', monospace;
            height: 100vh;
            overflow: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 4px;
        }

        /* Terminal Layout */
        .terminal {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #000000;
        }

        /* ========== TOP BAR ========== */
        .top-bar {
            background: #050505;
            border-bottom: 1px solid #1a1a1a;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .brand {
            display: flex;
            flex-direction: column;
        }

        .logo-main {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .logo-icon {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #00ff88);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff, #cccccc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .tagline {
            font-size: 9px;
            color: #444;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .market-tickers {
            display: flex;
            gap: 24px;
        }

        .ticker {
            display: flex;
            gap: 8px;
            align-items: baseline;
            padding: 4px 12px;
            background: #0a0a0a;
            border-radius: 6px;
            border: 1px solid #1a1a1a;
        }

        .ticker-symbol {
            font-size: 12px;
            color: #888;
            font-weight: 500;
        }

        .ticker-price {
            font-size: 14px;
            font-weight: 600;
            font-family: monospace;
            color: #fff;
        }

        .ticker-change {
            font-size: 11px;
            font-weight: 500;
        }
        .ticker-change.positive { color: #00ff88; }
        .ticker-change.negative { color: #ff3355; }

        .user-section {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .balance-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            padding: 6px 16px;
            text-align: center;
        }

        .balance-label {
            font-size: 9px;
            color: #666;
            letter-spacing: 1px;
        }

        .balance-value {
            font-size: 16px;
            font-weight: 700;
            font-family: monospace;
            color: #00ff88;
        }

        .topup-btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .topup-btn:hover {
            opacity: 0.8;
            transform: translateY(-1px);
        }

        .auth-btn {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .auth-btn:hover {
            background: #2a2a2a;
        }

        /* ========== MAIN LAYOUT ========== */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 1px;
            background: #1a1a1a;
        }

        /* ========== LEFT PANEL - WATCHLIST ========== */
        .left-panel {
            width: 280px;
            background: #050505;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .panel-header {
            padding: 16px;
            border-bottom: 1px solid #1a1a1a;
        }

        .panel-header h3 {
            font-size: 11px;
            color: #666;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .search-box {
            margin-top: 12px;
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            padding: 8px 12px;
            color: #fff;
            font-size: 12px;
        }
        .search-box:focus {
            outline: none;
            border-color: #00ff88;
        }

        .watchlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #0a0a0a;
            transition: all 0.2s;
        }
        .watchlist-item:hover {
            background: #0a0a0a;
        }
        .watchlist-item.active {
            background: #0a1a0a;
            border-left: 2px solid #00ff88;
        }

        .coin-symbol {
            font-size: 14px;
            font-weight: 600;
        }
        .coin-name {
            font-size: 10px;
            color: #555;
            margin-top: 2px;
        }
        .coin-price {
            text-align: right;
        }
        .price {
            font-size: 13px;
            font-family: monospace;
        }
        .change {
            font-size: 10px;
            margin-top: 2px;
        }
        .positive { color: #00ff88; }
        .negative { color: #ff3355; }

        /* ========== CENTER PANEL - CHART ========== */
        .center-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000000;
            min-width: 0;
        }

        .chart-header {
            padding: 12px 20px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .symbol-info {
            display: flex;
            align-items: baseline;
            gap: 16px;
        }
        .symbol-name {
            font-size: 22px;
            font-weight: 700;
        }
        .symbol-price {
            font-size: 28px;
            font-weight: 600;
            font-family: monospace;
        }
        .symbol-change {
            font-size: 14px;
            font-weight: 500;
        }

        .timeframes {
            display: flex;
            gap: 6px;
        }
        .tf-btn {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #888;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tf-btn:hover {
            border-color: #00ff88;
            color: #00ff88;
        }
        .tf-btn.active {
            background: #00ff88;
            color: #000;
            border-color: #00ff88;
        }

        .chart-container {
            flex: 1;
            position: relative;
            min-height: 0;
            padding: 10px;
        }
        #chart {
            width: 100%;
            height: 100%;
            min-height: 400px;
        }

        /* ========== RIGHT PANEL - TRADING ========== */
        .right-panel {
            width: 340px;
            background: #050505;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .trade-tabs {
            display: flex;
            padding: 16px;
            gap: 12px;
        }
        .trade-tab {
            flex: 1;
            padding: 12px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            color: #888;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .trade-tab.buy.active {
            background: #00ff88;
            color: #000;
            border-color: #00ff88;
        }
        .trade-tab.sell.active {
            background: #ff3355;
            color: #fff;
            border-color: #ff3355;
        }

        .trade-form {
            padding: 16px;
        }
        .input-group {
            margin-bottom: 14px;
        }
        .input-group label {
            display: block;
            font-size: 11px;
            color: #666;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .input-group input {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            padding: 10px 12px;
            color: #fff;
            font-family: monospace;
            font-size: 14px;
        }
        .input-group input:focus {
            outline: none;
            border-color: #00ff88;
        }

        .execute-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }
        .execute-btn.buy {
            background: #00ff88;
            color: #000;
        }
        .execute-btn.sell {
            background: #ff3355;
            color: #fff;
        }
        .execute-btn:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding: 16px;
            border-top: 1px solid #1a1a1a;
        }
        .stat-card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        .stat-label {
            font-size: 9px;
            color: #666;
            letter-spacing: 1px;
        }
        .stat-value {
            font-size: 16px;
            font-weight: 700;
            margin-top: 4px;
        }

        .section {
            padding: 16px;
            border-top: 1px solid #1a1a1a;
        }
        .section-title {
            font-size: 11px;
            color: #666;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .position-item, .history-item {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
        }
        .position-row, .history-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Status Bar */
        .status-bar {
            background: #050505;
            border-top: 1px solid #1a1a1a;
            padding: 6px 24px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #555;
            font-family: monospace;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1s infinite;
            margin-right: 6px;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 28px;
            width: 90%;
            max-width: 420px;
        }
        .emotion-buttons {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 12px;
            margin: 24px 0;
        }
        .emotion-btn {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            padding: 12px;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .emotion-btn:hover {
            background: #00ff88;
            color: #000;
            border-color: #00ff88;
        }
    </style>
</head>
<body>
    <div class="terminal" id="app">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; gap: 20px;">
            <div style="font-size: 32px; font-weight: 700; background: linear-gradient(135deg, #fff, #00ff88); -webkit-background-clip: text; background-clip: text; color: transparent;">▲ ATHARVA CAPITAL</div>
            <div style="color: #666; letter-spacing: 2px;">by Atharva Darshanwar</div>
            <div style="width: 40px; height: 40px; border: 2px solid #1a1a1a; border-top-color: #00ff88; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            <div style="color: #444;">Initializing Professional Terminal...</div>
        </div>
    </div>

    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <script>
        // ============ GLOBAL STATE ============
        let currentUser = null;
        let userData = {
            balance: 10000,
            positions: [],
            tradeHistory: [],
            emotions: []
        };
        
        let selectedCoin = 'BTCUSDT';
        let selectedCoinName = 'BTC';
        let currentPrice = 0;
        let currentChange = 0;
        let marketPrices = {};
        let allCoins = [];
        let chart = null;
        let candlestickSeries = null;
        let currentInterval = '1h';
        
        // ============ LOAD ALL COINS ============
        async function loadAllCoins() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/exchangeInfo');
                const data = await response.json();
                allCoins = data.symbols
                    .filter(s => s.quoteAsset === 'USDT' && s.status === 'TRADING')
                    .map(s => ({ symbol: s.symbol, baseAsset: s.baseAsset }))
                    .slice(0, 300);
                return allCoins;
            } catch(e) {
                console.error(e);
                return [];
            }
        }
        
        // ============ SEARCH ============
        function searchCoins(query) {
            if (!query || query.length < 2) return [];
            return allCoins.filter(c => c.symbol.toLowerCase().includes(query.toLowerCase())).slice(0, 15);
        }
        
        // ============ FETCH PRICES ============
        async function fetchPrices() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/ticker/24hr');
                const data = await response.json();
                data.forEach(item => {
                    marketPrices[item.symbol] = {
                        price: parseFloat(item.lastPrice),
                        change: parseFloat(item.priceChangePercent),
                        high: parseFloat(item.highPrice),
                        low: parseFloat(item.lowPrice)
                    };
                });
                if (marketPrices[selectedCoin]) {
                    currentPrice = marketPrices[selectedCoin].price;
                    currentChange = marketPrices[selectedCoin].change;
                }
                updatePriceDisplay();
                renderWatchlist();
                renderPositions();
                return marketPrices;
            } catch(e) {
                console.error(e);
            }
        }
        
        function updatePriceDisplay() {
            const priceEl = document.getElementById('symbolPrice');
            const changeEl = document.getElementById('symbolChange');
            if (priceEl) priceEl.innerText = `$${currentPrice?.toLocaleString() || '—'}`;
            if (changeEl) {
                changeEl.innerText = `${currentChange >= 0 ? '+' : ''}${currentChange?.toFixed(2) || '0'}%`;
                changeEl.className = `symbol-change ${currentChange >= 0 ? 'positive' : 'negative'}`;
            }
        }
        
        // ============ FETCH CHART DATA ============
        async function fetchChartData() {
            try {
                const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${selectedCoin}&interval=${currentInterval}&limit=150`);
                const data = await response.json();
                const chartData = data.map(k => ({
                    time: k[0] / 1000,
                    open: parseFloat(k[1]),
                    high: parseFloat(k[2]),
                    low: parseFloat(k[3]),
                    close: parseFloat(k[4])
                }));
                if (candlestickSeries && chartData.length > 0) {
                    candlestickSeries.setData(chartData);
                    chart?.timeScale().fitContent();
                }
                return chartData;
            } catch(e) {
                console.error(e);
            }
        }
        
        // ============ INIT CHART ============
        async function initChart() {
            const container = document.getElementById('chart');
            if (!container) return false;
            
            if (typeof LightweightCharts === 'undefined') {
                setTimeout(initChart, 500);
                return false;
            }
            
            try {
                chart = LightweightCharts.createChart(container, {
                    layout: { background: { color: '#000000' }, textColor: '#888888' },
                    grid: { vertLines: { color: '#0a0a0a' }, horzLines: { color: '#0a0a0a' } },
                    crosshair: { mode: 0, vertLine: { color: '#333', width: 1 }, horzLine: { color: '#333', width: 1 } },
                    rightPriceScale: { borderColor: '#1a1a1a' },
                    timeScale: { borderColor: '#1a1a1a', timeVisible: true, secondsVisible: false },
                    width: container.clientWidth,
                    height: 450
                });
                
                candlestickSeries = chart.addCandlestickSeries({
                    upColor: '#00ff88',
                    downColor: '#ff3355',
                    borderUpColor: '#00ff88',
                    borderDownColor: '#ff3355',
                    wickUpColor: '#00ff88',
                    wickDownColor: '#ff3355'
                });
                
                window.addEventListener('resize', () => {
                    if (chart && container) {
                        chart.applyOptions({ width: container.clientWidth });
                    }
                });
                
                await fetchChartData();
                return true;
            } catch(e) {
                console.error('Chart init error:', e);
                return false;
            }
        }
        
        // ============ EXECUTE TRADE ============
        async function executeTrade(side) {
            const amount = parseFloat(document.getElementById('tradeAmount')?.value || 0);
            const sl = parseFloat(document.getElementById('stopLoss')?.value || 0);
            const tp = parseFloat(document.getElementById('takeProfit')?.value || 0);
            
            if (!amount || amount <= 0) {
                alert('Please enter valid amount');
                return;
            }
            
            const totalCost = amount * currentPrice;
            
            if (side === 'buy') {
                if (totalCost > userData.balance) {
                    alert(`Insufficient balance! Available: $${userData.balance.toFixed(2)}`);
                    return;
                }
                userData.positions.push({
                    id: Date.now(),
                    coin: selectedCoin,
                    coinName: selectedCoinName,
                    amount: amount,
                    entryPrice: currentPrice,
                    stopLoss: sl || null,
                    takeProfit: tp || null,
                    timestamp: new Date().toISOString()
                });
                userData.balance -= totalCost;
            } else {
                const position = userData.positions.find(p => p.coin === selectedCoin);
                if (!position) {
                    alert('No position to sell');
                    return;
                }
                const pnl = (currentPrice - position.entryPrice) * position.amount;
                userData.tradeHistory.unshift({
                    id: Date.now(),
                    coin: selectedCoin,
                    coinName: selectedCoinName,
                    entryPrice: position.entryPrice,
                    exitPrice: currentPrice,
                    amount: position.amount,
                    pnl: pnl,
                    timestamp: new Date().toISOString()
                });
                userData.balance += position.amount * currentPrice;
                userData.positions = userData.positions.filter(p => p.id !== position.id);
                document.getElementById('emotionModal')?.classList.add('show');
            }
            
            saveToLocal();
            renderUI();
            document.getElementById('tradeAmount').value = '';
            document.getElementById('stopLoss').value = '';
            document.getElementById('takeProfit').value = '';
        }
        
        function saveToLocal() {
            localStorage.setItem('atharva_user_data', JSON.stringify({
                balance: userData.balance,
                positions: userData.positions,
                tradeHistory: userData.tradeHistory,
                emotions: userData.emotions
            }));
        }
        
        function loadFromLocal() {
            const saved = localStorage.getItem('atharva_user_data');
            if (saved) {
                const data = JSON.parse(saved);
                userData.balance = data.balance || 10000;
                userData.positions = data.positions || [];
                userData.tradeHistory = data.tradeHistory || [];
                userData.emotions = data.emotions || [];
            }
        }
        
        function topUpBalance() {
            userData.balance += 1000;
            saveToLocal();
            renderUI();
        }
        
        function submitEmotion(emotion) {
            userData.emotions.push({ emotion, timestamp: new Date().toISOString() });
            saveToLocal();
            document.getElementById('emotionModal')?.classList.remove('show');
            renderUI();
        }
        
        // ============ STATS ============
        function calculateStats() {
            const trades = userData.tradeHistory;
            const winning = trades.filter(t => t.pnl > 0);
            const totalPnL = trades.reduce((s, t) => s + t.pnl, 0);
            const winRate = trades.length > 0 ? (winning.length / trades.length * 100) : 0;
            const bestTrade = trades.length > 0 ? Math.max(...trades.map(t => t.pnl)) : 0;
            const worstTrade = trades.length > 0 ? Math.min(...trades.map(t => t.pnl)) : 0;
            return { totalPnL, winRate, bestTrade, worstTrade, totalTrades: trades.length };
        }
        
        // ============ RENDER FUNCTIONS ============
        function renderWatchlist() {
            const container = document.getElementById('watchlistContainer');
            if (!container) return;
            const topCoins = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'BNBUSDT', 'XRPUSDT', 'DOGEUSDT', 'ADAUSDT', 'AVAXUSDT', 'DOTUSDT', 'MATICUSDT'];
            container.innerHTML = topCoins.map(symbol => {
                const data = marketPrices[symbol];
                return `
                    <div class="watchlist-item ${selectedCoin === symbol ? 'active' : ''}" onclick="selectCoin('${symbol}')">
                        <div>
                            <div class="coin-symbol">${symbol.replace('USDT', '')}</div>
                            <div class="coin-name">${symbol}</div>
                        </div>
                        <div class="coin-price">
                            <div class="price">$${data?.price?.toLocaleString() || '—'}</div>
                            <div class="change ${data?.change >= 0 ? 'positive' : 'negative'}">${data?.change >= 0 ? '+' : ''}${data?.change?.toFixed(2) || '0'}%</div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderPositions() {
            const container = document.getElementById('positionsContainer');
            if (!container) return;
            if (userData.positions.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#555; padding:20px;">No open positions</div>';
                return;
            }
            container.innerHTML = userData.positions.map(pos => {
                const current = marketPrices[pos.coin]?.price || pos.entryPrice;
                const pnl = (current - pos.entryPrice) * pos.amount;
                return `
                    <div class="position-item">
                        <div class="position-row">
                            <span style="font-weight:600;">${pos.coinName}</span>
                            <span class="${pnl >= 0 ? 'positive' : 'negative'}">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</span>
                        </div>
                        <div class="position-row" style="font-size:11px; color:#555; margin-top:6px;">
                            <span>Entry: $${pos.entryPrice.toFixed(2)}</span>
                            <span>Amount: ${pos.amount.toFixed(6)}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function renderHistory() {
            const container = document.getElementById('historyContainer');
            if (!container) return;
            if (userData.tradeHistory.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#555; padding:20px;">No trades yet</div>';
                return;
            }
            container.innerHTML = userData.tradeHistory.slice(0, 10).map(trade => `
                <div class="history-item">
                    <div class="history-row">
                        <span style="font-weight:600;">${trade.coinName}</span>
                        <span class="${trade.pnl >= 0 ? 'positive' : 'negative'}">${trade.pnl >= 0 ? '+' : ''}$${trade.pnl.toFixed(2)}</span>
                    </div>
                    <div class="history-row" style="font-size:10px; color:#555; margin-top:4px;">
                        <span>Entry: $${trade.entryPrice?.toFixed(2)}</span>
                        <span>Exit: $${trade.exitPrice?.toFixed(2)}</span>
                    </div>
                </div>
            `).join('');
        }
        
        function updateStats() {
            const stats = calculateStats();
            document.getElementById('statTotalPnL').innerHTML = `${stats.totalPnL >= 0 ? '+' : ''}$${stats.totalPnL.toFixed(2)}`;
            document.getElementById('statWinRate').innerHTML = `${stats.winRate.toFixed(1)}%`;
            document.getElementById('statBestTrade').innerHTML = `+$${stats.bestTrade.toFixed(2)}`;
            document.getElementById('statWorstTrade').innerHTML = `$${stats.worstTrade.toFixed(2)}`;
            document.getElementById('statTotalTrades').innerHTML = stats.totalTrades;
            document.getElementById('balanceDisplay').innerHTML = `$${userData.balance.toFixed(2)}`;
        }
        
        // ============ SELECT COIN ============
        window.selectCoin = async (symbol) => {
            selectedCoin = symbol;
            selectedCoinName = symbol.replace('USDT', '');
            document.getElementById('symbolName').innerHTML = `${selectedCoinName}/USDT`;
            document.getElementById('executeBtn').innerHTML = `BUY ${selectedCoinName}`;
            document.getElementById('executeBtn').className = 'execute-btn buy';
            await fetchChartData();
            renderWatchlist();
        };
        
        window.changeTimeframe = (tf) => {
            currentInterval = tf;
            document.querySelectorAll('.tf-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            fetchChartData();
        };
        
        window.setTradeSide = (side) => {
            const buyTab = document.getElementById('buyTab');
            const sellTab = document.getElementById('sellTab');
            const execBtn = document.getElementById('executeBtn');
            if (side === 'buy') {
                buyTab.classList.add('active');
                sellTab.classList.remove('active');
                execBtn.className = 'execute-btn buy';
                execBtn.innerHTML = `BUY ${selectedCoinName}`;
                execBtn.onclick = () => executeTrade('buy');
            } else {
                sellTab.classList.add('active');
                buyTab.classList.remove('active');
                execBtn.className = 'execute-btn sell';
                execBtn.innerHTML = `SELL ${selectedCoinName}`;
                execBtn.onclick = () => executeTrade('sell');
            }
        };
        
        // ============ MAIN RENDER ============
        async function renderUI() {
            const stats = calculateStats();
            const app = document.getElementById('app');
            
            app.innerHTML = `
                <div class="top-bar">
                    <div class="brand">
                        <div class="logo-main">
                            <span class="logo-icon">▲</span>
                            <span class="logo-text">ATHARVA CAPITAL</span>
                        </div>
                        <div class="tagline">by Atharva Darshanwar</div>
                    </div>
                    <div class="market-tickers" id="marketTickers">
                        <div class="ticker"><span class="ticker-symbol">BTC</span><span class="ticker-price" id="btcPrice">—</span><span id="btcChange" class="ticker-change">—</span></div>
                        <div class="ticker"><span class="ticker-symbol">ETH</span><span class="ticker-price" id="ethPrice">—</span><span id="ethChange" class="ticker-change">—</span></div>
                        <div class="ticker"><span class="ticker-symbol">SOL</span><span class="ticker-price" id="solPrice">—</span><span id="solChange" class="ticker-change">—</span></div>
                    </div>
                    <div class="user-section">
                        <div class="balance-card">
                            <div class="balance-label">VIRTUAL BALANCE</div>
                            <div class="balance-value" id="balanceDisplay">$${userData.balance.toFixed(2)}</div>
                        </div>
                        <button class="topup-btn" onclick="topUpBalance()">+ ADD FUNDS</button>
                    </div>
                </div>
                
                <div class="main-layout">
                    <div class="left-panel">
                        <div class="panel-header">
                            <h3>MARKETS</h3>
                            <input type="text" class="search-box" id="searchInput" placeholder="Search coins... BTC, ETH, SOL">
                            <div class="search-results" id="searchResults" style="position:absolute; background:#1a1a1a; width:248px; border-radius:8px; margin-top:5px;"></div>
                        </div>
                        <div id="watchlistContainer"></div>
                    </div>
                    
                    <div class="center-panel">
                        <div class="chart-header">
                            <div class="symbol-info">
                                <span class="symbol-name" id="symbolName">${selectedCoinName}/USDT</span>
                                <span class="symbol-price" id="symbolPrice">$${currentPrice?.toLocaleString() || '—'}</span>
                                <span id="symbolChange" class="symbol-change ${currentChange >= 0 ? 'positive' : 'negative'}">${currentChange >= 0 ? '+' : ''}${currentChange?.toFixed(2) || '0'}%</span>
                            </div>
                            <div class="timeframes">
                                <button class="tf-btn" onclick="changeTimeframe('1m')">1m</button>
                                <button class="tf-btn" onclick="changeTimeframe('5m')">5m</button>
                                <button class="tf-btn" onclick="changeTimeframe('15m')">15m</button>
                                <button class="tf-btn active" onclick="changeTimeframe('1h')">1h</button>
                                <button class="tf-btn" onclick="changeTimeframe('4h')">4h</button>
                                <button class="tf-btn" onclick="changeTimeframe('1D')">1D</button>
                            </div>
                        </div>
                        <div class="chart-container">
                            <div id="chart"></div>
                        </div>
                    </div>
                    
                    <div class="right-panel">
                        <div class="trade-tabs">
                            <button class="trade-tab buy active" id="buyTab" onclick="setTradeSide('buy')">BUY</button>
                            <button class="trade-tab sell" id="sellTab" onclick="setTradeSide('sell')">SELL</button>
                        </div>
                        <div class="trade-form">
                            <div class="input-group">
                                <label>AMOUNT (${selectedCoinName})</label>
                                <input type="number" id="tradeAmount" placeholder="0.00">
                            </div>
                            <div class="input-group">
                                <label>STOP LOSS (Optional)</label>
                                <input type="number" id="stopLoss" placeholder="0.00">
                            </div>
                            <div class="input-group">
                                <label>TAKE PROFIT (Optional)</label>
                                <input type="number" id="takeProfit" placeholder="0.00">
                            </div>
                            <button class="execute-btn buy" id="executeBtn" onclick="executeTrade('buy')">BUY ${selectedCoinName}</button>
                        </div>
                        
                        <div class="stats-grid">
                            <div class="stat-card"><div class="stat-label">TOTAL P&L</div><div class="stat-value" id="statTotalPnL">${stats.totalPnL >= 0 ? '+' : ''}$${stats.totalPnL.toFixed(2)}</div></div>
                            <div class="stat-card"><div class="stat-label">WIN RATE</div><div class="stat-value" id="statWinRate">${stats.winRate.toFixed(1)}%</div></div>
                            <div class="stat-card"><div class="stat-label">BEST TRADE</div><div class="stat-value positive" id="statBestTrade">+$${stats.bestTrade.toFixed(2)}</div></div>
                            <div class="stat-card"><div class="stat-label">WORST TRADE</div><div class="stat-value negative" id="statWorstTrade">$${stats.worstTrade.toFixed(2)}</div></div>
                            <div class="stat-card"><div class="stat-label">TOTAL TRADES</div><div class="stat-value" id="statTotalTrades">${stats.totalTrades}</div></div>
                        </div>
                        
                        <div class="section">
                            <div class="section-title">OPEN POSITIONS (${userData.positions.length})</div>
                            <div id="positionsContainer"></div>
                        </div>
                        
                        <div class="section">
                            <div class="section-title">RECENT TRADES</div>
                            <div id="historyContainer"></div>
                        </div>
                    </div>
                </div>
                
                <div class="status-bar">
                    <div><span class="live-dot"></span> BINANCE LIVE DATA • REAL-TIME</div>
                    <div>PROFESSIONAL TRADING TERMINAL</div>
                    <div>ATHARVA CAPITAL v3.0</div>
                </div>
                
                <div class="modal" id="emotionModal">
                    <div class="modal-content">
                        <h3 style="font-size:20px; margin-bottom:10px;">🤔 How did you feel?</h3>
                        <div class="emotion-buttons">
                            <button class="emotion-btn" onclick="submitEmotion('Fear')">😨 Fear</button>
                            <button class="emotion-btn" onclick="submitEmotion('Greed')">🤑 Greed</button>
                            <button class="emotion-btn" onclick="submitEmotion('FOMO')">😍 FOMO</button>
                            <button class="emotion-btn" onclick="submitEmotion('Confident')">😎 Confident</button>
                            <button class="emotion-btn" onclick="submitEmotion('Calm')">😌 Calm</button>
                            <button class="emotion-btn" onclick="submitEmotion('Revenge')">😤 Revenge</button>
                        </div>
                        <button class="execute-btn buy" onclick="document.getElementById('emotionModal').classList.remove('show')" style="margin-top:10px;">Continue</button>
                    </div>
                </div>
            `;
            
            // Update tickers
            if (marketPrices['BTCUSDT']) {
                document.getElementById('btcPrice').innerText = `$${marketPrices['BTCUSDT'].price?.toLocaleString()}`;
                document.getElementById('btcChange').innerText = `${marketPrices['BTCUSDT'].change >= 0 ? '+' : ''}${marketPrices['BTCUSDT'].change?.toFixed(2)}%`;
                document.getElementById('btcChange').className = `ticker-change ${marketPrices['BTCUSDT'].change >= 0 ? 'positive' : 'negative'}`;
            }
            if (marketPrices['ETHUSDT']) {
                document.getElementById('ethPrice').innerText = `$${marketPrices['ETHUSDT'].price?.toLocaleString()}`;
                document.getElementById('ethChange').innerText = `${marketPrices['ETHUSDT'].change >= 0 ? '+' : ''}${marketPrices['ETHUSDT'].change?.toFixed(2)}%`;
                document.getElementById('ethChange').className = `ticker-change ${marketPrices['ETHUSDT'].change >= 0 ? 'positive' : 'negative'}`;
            }
            if (marketPrices['SOLUSDT']) {
                document.getElementById('solPrice').innerText = `$${marketPrices['SOLUSDT'].price?.toLocaleString()}`;
                document.getElementById('solChange').innerText = `${marketPrices['SOLUSDT'].change >= 0 ? '+' : ''}${marketPrices['SOLUSDT'].change?.toFixed(2)}%`;
                document.getElementById('solChange').className = `ticker-change ${marketPrices['SOLUSDT'].change >= 0 ? 'positive' : 'negative'}`;
            }
            
            renderWatchlist();
            renderPositions();
            renderHistory();
            updateStats();
            
            // Search functionality
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const query = e.target.value;
                    if (query.length < 2) {
                        searchResults.style.display = 'none';
                        return;
                    }
                    const results = searchCoins(query);
                    if (results.length > 0) {
                        searchResults.innerHTML = results.map(coin => `
                            <div class="search-result-item" onclick="selectCoin('${coin.symbol}'); document.getElementById('searchInput').value = ''; searchResults.style.display = 'none';">
                                <strong>${coin.symbol.replace('USDT', '')}</strong>
                                <span style="color:#666;"> / ${coin.symbol}</span>
                            </div>
                        `).join('');
                        searchResults.style.display = 'block';
                    } else {
                        searchResults.innerHTML = '<div class="search-result-item">No results found</div>';
                        searchResults.style.display = 'block';
                    }
                });
                document.addEventListener('click', (e) => {
                    if (!searchInput.contains(e.target)) searchResults.style.display = 'none';
                });
            }
            
            // Initialize chart
            setTimeout(initChart, 500);
        }
        
        // ============ INIT ============
        async function init() {
            loadFromLocal();
            await loadAllCoins();
            await fetchPrices();
            setInterval(fetchPrices, 5000);
            await renderUI();
        }
        
        init();
    </script>
</body>
</html>
